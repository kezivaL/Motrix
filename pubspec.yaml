name: Motrix
version: 1.0.0+1
description: A Flutter web project for motor diagnosis.

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  pdf: ^3.10.7
  printing: ^5.12.0

flutter:
  assets:
    - assets/logo.png
  uses-material-design: true

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/Motrix.jpeg"